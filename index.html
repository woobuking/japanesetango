<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>일본어 이미지 단어장</title>
  <script src="words_data.js"></script>
  <meta name="theme-color" content="#4f46e5" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow:      #FFC300;
      --yellow-dark: #E5A800;
      --yellow-soft: #FFF8E1;
      --navy:        #1E1A3C;
      --navy-700:    #2D2760;
      --navy-soft:   #EEEAF8;
      --line:        #EBEBEB;
      --text:        #1A1A2E;
      --muted:       #8A8A9A;
      --white:       #ffffff;
      --green:       #22C55E;
      --red:         #EF4444;
      --shadow:      0 8px 32px rgba(30, 26, 60, 0.10);
      --shadow-lg:   0 16px 48px rgba(30, 26, 60, 0.14);
    }

    html, body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: #FAFAFA;
      color: var(--text);
    }

    body { padding: 20px 16px 48px; }

    .app { width: min(100%, 520px); margin: 0 auto; }

    .btn {
      border: none;
      border-radius: 999px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--navy);
      color: #fff;
      font-size: 17px;
      padding: 18px;
      width: 100%;
      letter-spacing: 0.02em;
    }

    .btn-ghost {
      background: var(--navy-soft);
      color: var(--navy);
      border: none;
      font-size: 14px;
      padding: 10px 20px;
    }

    .card {
      background: #fff;
      border: none;
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* ══════════════════════════════
       메인 화면
    ══════════════════════════════ */
    .main-hero {
      background: var(--navy);
      border-radius: 28px;
      padding: 32px 24px;
      margin-bottom: 24px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    .main-hero::after {
      content: '🇯🇵';
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 72px;
      opacity: 0.25;
    }

    .main-hero .logo { display: none; }

    .main-hero h1 {
      font-size: 24px;
      font-weight: 900;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .main-hero p {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
    }

    .section-label {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 0.02em;
      margin-bottom: 12px;
    }

    .level-grid {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .level-btn {
      flex: 1;
      border: 2px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      padding: 12px 4px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .level-btn.selected {
      border-color: var(--yellow);
      background: var(--yellow);
      color: var(--navy);
    }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .mode-btn {
      border: 2px solid var(--line);
      border-radius: 20px;
      background: #fff;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      padding: 20px 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      box-shadow: var(--shadow);
    }

    .mode-btn .mode-icon { font-size: 32px; display: block; margin-bottom: 10px; }
    .mode-btn .mode-name { display: block; font-size: 15px; color: var(--text); }
    .mode-btn .mode-desc { display: block; font-size: 11px; font-weight: 600; margin-top: 4px; color: var(--muted); }

    .mode-btn.selected {
      border-color: var(--yellow);
      background: var(--yellow-soft);
    }

    .mode-btn.selected .mode-name { color: var(--navy); }
    .mode-btn.selected .mode-desc { color: var(--navy-700); }

    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }

    .stat-box {
      background: #fff;
      border-radius: 18px;
      padding: 16px 10px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .stat-box .stat-val {
      font-size: 24px;
      font-weight: 900;
      color: var(--navy);
      line-height: 1;
    }

    .stat-box .stat-lbl {
      margin-top: 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
    }

    .config-toggle {
      text-align: center;
      margin-bottom: 14px;
    }

    .config-panel {
      background: var(--navy-soft);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 16px;
      display: none;
    }

    .config-panel.open { display: block; }

    .config-panel label {
      display: block;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .config-input {
      width: 100%;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font-size: 13px;
      padding: 10px 14px;
      outline: none;
      margin-bottom: 10px;
    }

    .config-input:focus { border-color: var(--yellow-dark); }
    .config-input:last-child { margin-bottom: 0; }

    .config-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      margin-bottom: 10px;
    }

    .config-download-btn {
      width: 100%;
      margin-top: 8px;
    }

    /* ══════════════════════════════
       학습 모드
    ══════════════════════════════ */
    .study-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .study-title { font-size: 16px; font-weight: 900; color: var(--navy); }
    .study-count { font-size: 14px; font-weight: 700; color: var(--muted); }

    .progress-bar-wrap {
      height: 6px;
      background: var(--line);
      border-radius: 99px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--yellow);
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .flashcard {
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      margin-bottom: 16px;
      background: #fff;
      cursor: pointer;
      user-select: none;
      touch-action: pan-y;
    }

    .card-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .card-image-placeholder {
      width: 100%;
      height: 220px;
      background: linear-gradient(135deg, #FFF8E1, #FFF3CD);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
      overflow: hidden;
    }

    /* 이미지 + 한글 오버레이 래퍼 */
    .img-wrap {
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    .img-korean-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 28px 18px 14px;
      background: linear-gradient(transparent, rgba(20, 18, 40, 0.72));
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.01em;
    }

    .overlay-english {
      display: block;
      font-size: 13px;
      font-weight: 600;
      opacity: 0.80;
      margin-top: 3px;
      letter-spacing: 0.02em;
    }

    .card-body { padding: 22px; }

    .card-japanese {
      font-size: 52px;
      font-weight: 900;
      color: var(--navy);
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .card-hiragana {
      font-size: 18px;
      color: var(--yellow-dark);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .card-korean {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }

    .card-english {
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
    }

    .card-category {
      display: inline-block;
      margin-top: 12px;
      background: var(--yellow-soft);
      color: var(--navy);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 800;
    }

    .study-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .btn-know {
      background: #ECFDF5;
      border: 2px solid #6EE7B7;
      color: #059669;
      font-size: 17px;
      padding: 18px;
      border-radius: 18px;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-know:active { background: #D1FAE5; transform: scale(0.97); }

    .btn-dontknow {
      background: #FFF1F2;
      border: 2px solid #FECDD3;
      color: #E11D48;
      font-size: 17px;
      padding: 18px;
      border-radius: 18px;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-dontknow:active { background: #FFE4E6; transform: scale(0.97); }

    .study-nav { display: flex; justify-content: center; }

    /* ══════════════════════════════
       테스트 모드
    ══════════════════════════════ */
    .quiz-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .btn-back {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--navy-soft);
      color: var(--navy);
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .btn-back:active { background: #D8D3F0; }

    .quiz-header-center {
      flex: 1;
      min-width: 0;
    }

    .quiz-header-center .study-title {
      font-size: 15px;
      margin-bottom: 6px;
    }

    .quiz-progress-bar { margin-bottom: 0; }

    .quiz-count-badge {
      background: var(--yellow);
      color: var(--navy);
      font-size: 13px;
      font-weight: 900;
      padding: 6px 12px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .quiz-img {
      border-radius: 24px;
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: var(--shadow-lg);
    }

    .quiz-image {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
    }

    .quiz-image-placeholder {
      width: 100%;
      height: 260px;
      background: linear-gradient(135deg, #FFF8E1, #FFF3CD);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quiz-label {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .quiz-choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .choice-btn {
      border: 2px solid var(--line);
      border-radius: 20px;
      background: #fff;
      color: var(--text);
      font-size: 20px;
      font-weight: 900;
      padding: 20px 10px 16px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      line-height: 1.2;
      box-shadow: var(--shadow);
    }

    .choice-btn:active { transform: scale(0.97); }

    .choice-btn .choice-hira {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-top: 6px;
    }

    .choice-btn.correct {
      border-color: var(--green);
      background: #ECFDF5;
      color: #059669;
    }

    .choice-btn.correct .choice-hira { color: #6EE7B7; }

    .choice-btn.wrong {
      border-color: var(--red);
      background: #FFF1F2;
      color: #E11D48;
    }

    .choice-btn.reveal-correct {
      border-color: var(--green);
      background: #ECFDF5;
      color: #059669;
    }

    .quiz-feedback {
      text-align: center;
      font-size: 15px;
      font-weight: 800;
      padding: 14px 18px;
      border-radius: 16px;
      margin-bottom: 8px;
      display: none;
      animation: feedbackIn 0.2s ease;
    }

    @keyframes feedbackIn {
      from { opacity: 0; transform: translateY(6px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .quiz-feedback.show { display: block; }
    .quiz-feedback.ok { background: #ECFDF5; color: #059669; }
    .quiz-feedback.ng { background: #FFF1F2; color: #E11D48; }

    /* ══════════════════════════════
       결과 화면
    ══════════════════════════════ */
    .result-card {
      padding: 36px 24px;
      text-align: center;
      margin-bottom: 20px;
    }

    .result-emoji { font-size: 64px; margin-bottom: 16px; }
    .result-title { font-size: 28px; font-weight: 900; color: var(--navy); margin-bottom: 8px; }
    .result-sub { font-size: 15px; color: var(--muted); line-height: 1.6; }

    .result-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .result-box {
      background: #fff;
      border-radius: 18px;
      padding: 18px 8px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .result-box .r-val {
      font-size: 30px;
      font-weight: 900;
      color: var(--navy);
      line-height: 1;
    }

    .result-box .r-lbl {
      margin-top: 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
    }

    .result-actions { display: grid; gap: 10px; }

    /* ══════════════════════════════
       오답 노트
    ══════════════════════════════ */
    .wrong-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .wrong-title { font-size: 22px; font-weight: 900; color: var(--navy); }

    .wrong-list { display: grid; gap: 10px; margin-bottom: 20px; }

    .wrong-item {
      background: #fff;
      border-radius: 18px;
      padding: 16px 18px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: center;
      box-shadow: var(--shadow);
    }

    .wrong-emoji { font-size: 32px; }

    .wrong-japanese { font-size: 22px; font-weight: 900; color: var(--navy); line-height: 1.1; }
    .wrong-hiragana { font-size: 13px; color: var(--yellow-dark); font-weight: 700; margin-top: 2px; }
    .wrong-korean { font-size: 14px; color: var(--text); font-weight: 700; margin-top: 4px; }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }

    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; font-weight: 600; }

    /* ── 로딩 ── */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(250, 250, 250, 0.90);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      display: none;
    }

    .loading-overlay.show { display: flex; }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid var(--line);
      border-top-color: var(--yellow);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text { font-size: 14px; font-weight: 700; color: var(--navy); }

    /* ── 토스트 ── */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      background: var(--navy);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 12px 22px;
      border-radius: 999px;
      transition: all 0.2s;
      z-index: 200;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── 반응형 ── */
    @media (max-width: 400px) {
      .level-grid { grid-template-columns: repeat(5, 1fr); gap: 5px; }
      .level-btn { font-size: 13px; padding: 12px 2px; }
      .card-japanese { font-size: 40px; }
      .quiz-choices { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- ════════ 메인 화면 ════════ -->
    <div id="screenMain" class="screen active">
      <div class="main-hero">
        <div class="logo">🇯🇵</div>
        <h1>일본어 이미지 단어장</h1>
        <p>JLPT 단어를 이미지로 직관적으로 학습합니다.</p>
      </div>

      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-val" id="statLearned">0</div>
          <div class="stat-lbl">오늘 학습</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="statAccuracy">—</div>
          <div class="stat-lbl">정답률</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="statWrong">0</div>
          <div class="stat-lbl">오답 단어</div>
        </div>
      </div>

      <div class="section-label">레벨 선택</div>
      <div class="level-grid" id="levelGrid">
        <button class="level-btn selected" data-level="N5">N5</button>
        <button class="level-btn" data-level="N4">N4</button>
        <button class="level-btn" data-level="N3">N3</button>
        <button class="level-btn" data-level="N2">N2</button>
        <button class="level-btn" data-level="N1">N1</button>
      </div>

      <div class="section-label">학습 모드</div>
      <div class="mode-grid">
        <button class="mode-btn selected" data-mode="study">
          <span class="mode-icon">📖</span>
          <span class="mode-name">학습 모드</span>
          <span class="mode-desc">이미지 + 단어 함께 보기</span>
        </button>
        <button class="mode-btn" data-mode="quiz">
          <span class="mode-icon">🧪</span>
          <span class="mode-name">테스트 모드</span>
          <span class="mode-desc">이미지 보고 단어 맞추기</span>
        </button>
      </div>

      <div class="config-toggle">
        <button class="btn btn-ghost" id="configToggleBtn">⚙️ 연동 설정</button>
        &nbsp;
        <button class="btn btn-ghost" id="wrongNoteBtn">📝 오답 노트 (<span id="wrongCount">0</span>)</button>
      </div>

      <div class="config-panel" id="configPanel">
        <label>Google Sheets CSV URL</label>
        <input class="config-input" id="sheetsUrl" type="url" placeholder="https://docs.google.com/spreadsheets/d/.../export?format=csv" />
        <label>Unsplash Access Key (선택)</label>
        <input class="config-input" id="unsplashKey" type="text" placeholder="your-unsplash-access-key" />
        <div class="config-hint">
          이미지: Unsplash(키 입력 시) → Wikipedia → AI 자동 생성 순으로 적용
        </div>
        <button type="button" class="btn btn-ghost config-download-btn" id="saveConfigBtn">설정 저장</button>
        <div class="config-hint" id="vocabCacheInfo"></div>
      </div>

      <button class="btn btn-primary" id="startBtn">학습 시작하기 →</button>
    </div>

    <!-- ════════ 학습 모드 ════════ -->
    <div id="screenStudy" class="screen">
      <div class="study-header">
        <div class="study-title" id="studyLevelLabel">N5 학습 모드</div>
        <div class="study-count" id="studyCount">1 / 20</div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="studyProgress" style="width:0%"></div>
      </div>

      <div class="flashcard" id="flashcard">
        <div class="img-wrap" id="cardImageWrap"></div>
        <div class="card-body">
          <div class="card-japanese" id="cardJapanese">—</div>
          <div class="card-hiragana" id="cardHiragana">—</div>
          <div class="card-korean" id="cardKorean">—</div>
          <div class="card-english" id="cardEnglish">—</div>
          <span class="card-category" id="cardCategory">—</span>
        </div>
      </div>

      <div class="study-actions">
        <button class="btn-know" id="btnKnow">✓ 알아요</button>
        <button class="btn-dontknow" id="btnDontKnow">✗ 몰라요</button>
      </div>
      <div class="study-nav">
        <button class="btn btn-ghost" id="studyExitBtn">← 메인으로</button>
      </div>

    /* ══════════════════════════════════════════════

    /* ══════════════════════════════════════════════
       데이터 로드
    ══════════════════════════════════════════════ */
    async function fetchWords(level) {
      // 1순위: Google Sheets (외부 URL 설정 시)
      if (config.sheetsUrl) {
        try {
          showLoading('단어 데이터 불러오는 중...');
          const res = await fetch(config.sheetsUrl);
          const csv = await res.text();
          const words = parseCsv(csv).filter((w) => !level || w.level === level);
          hideLoading();
          if (words.length) return words;
        } catch {
          hideLoading();
          showToast('Sheets 로드 실패. 내장 데이터를 사용합니다.');
        }
      }

      // 2순위: 하드코딩된 ALL_WORDS (words_data.js)
      if (typeof ALL_WORDS !== 'undefined') {
        const words = ALL_WORDS.filter((w) => w.level === level);
        if (words.length) return words;
      }

      // 3순위: 내장 샘플 (N5 60개)
      return SAMPLE_WORDS.filter((w) => w.level === level);
    }

    function parseCsv(csv) {
      const lines = csv.trim().split('\n');
      const headers = lines[0].split(',').map((h) => h.trim().replace(/^"|"$/g, ''));
      return lines.slice(1).map((line) => {
        const values = line.split(',').map((v) => v.trim().replace(/^"|"$/g, ''));
        const obj = {};
        headers.forEach((h, i) => { obj[h] = values[i] || ''; });
        return obj;
      }).filter((w) => w.japanese);
    }

    /* ══════════════════════════════════════════════
       이미지 로드 (Unsplash → Wikipedia → AI 순 fallback)
    ══════════════════════════════════════════════ */
    const imageCache = {};

    // 이미지 검색용 키워드 추출
    function toSearchTerm(word) {
      // 영어 → 한국어 → 일본어 순으로 fallback
      let term = '';
      if (word.english && word.english.trim()) {
        term = word.english.split(',')[0].trim();
        // "to 동사" → 동명사 (to meet → meeting)
        if (/^to\s+/i.test(term)) {
          const verb = term.replace(/^to\s+/i, '').trim();
          term = verb.endsWith('e') ? verb.slice(0, -1) + 'ing' : verb + 'ing';
        }
      } else if (word.korean && word.korean.trim()) {
        term = word.korean.split(',')[0].trim();
      } else {
        term = word.japanese || '';
      }
      return term.trim();
    }

    async function fetchImage(word) {
      if (word.image_url) return word.image_url;
      if (imageCache[word.word_id] !== undefined) return imageCache[word.word_id];

      const searchTerm = toSearchTerm(word);

      // 1순위: Unsplash (키 있을 때)
      if (config.unsplashKey) {
        try {
          const url = `https://api.unsplash.com/photos/random?query=${encodeURIComponent(searchTerm)}&orientation=landscape&client_id=${config.unsplashKey}`;
          const res = await fetch(url);
          if (res.ok) {
            const data = await res.json();
            const imgUrl = data.urls?.regular || null;
            if (imgUrl) { imageCache[word.word_id] = imgUrl; return imgUrl; }
          }
        } catch {}
      }

      // 2순위: Wikipedia 무료 이미지 (구체적 명사에 효과적)
      try {
        const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(searchTerm)}&prop=pageimages&format=json&pithumbsize=500&origin=*`;
        const res = await fetch(url);
        if (res.ok) {
          const data = await res.json();
          const pages = data.query?.pages;
          if (pages) {
            const imgUrl = Object.values(pages)[0]?.thumbnail?.source || null;
            if (imgUrl) { imageCache[word.word_id] = imgUrl; return imgUrl; }
          }
        }
      } catch {}

      // 3순위: AI 이미지 생성 (항상 폴백)
      const prompt = encodeURIComponent(`${searchTerm}, simple clear illustration`);
      const imgUrl = `https://image.pollinations.ai/prompt/${prompt}?width=500&height=380&nologo=true&seed=${word.word_id.replace(/\D/g,'')||0}`;
      imageCache[word.word_id] = imgUrl;
      return imgUrl;
    }

    function renderImage(wrap, url, korean, english) {
      const isQuiz = wrap.id === 'quizImageWrap';
      const imgClass = isQuiz ? 'quiz-image' : 'card-image';
      const engPart = english ? `<span class="overlay-english">${escHtml(english)}</span>` : '';
      const overlay = `<div class="img-korean-overlay">${escHtml(korean || '')}${engPart}</div>`;

      wrap.className = 'img-wrap';

      if (url) {
        const img = document.createElement('img');
        img.className = imgClass;
        img.src = url;
        img.alt = '';
        img.loading = 'lazy';
        img.onerror = () => {
          delete imageCache[wrap._wordId];
          wrap.innerHTML = `<div class="${isQuiz ? 'quiz-image-placeholder' : 'card-image-placeholder'}"></div>${overlay}`;
        };
        wrap.innerHTML = overlay;
        wrap.insertBefore(img, wrap.firstChild);
      } else {
        wrap.innerHTML = `<div class="${isQuiz ? 'quiz-image-placeholder' : 'card-image-placeholder'}"></div>${overlay}`;
      }
    }

    /* ══════════════════════════════════════════════
       세션 시작
    ══════════════════════════════════════════════ */
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    async function startSession() {
      const words = await fetchWords(sessionLevel);
      if (!words.length) { showToast('단어 데이터가 없습니다.'); return; }
      allWords = words;
      sessionWords = shuffle(words).slice(0, Math.min(20, words.length));
      sessionIndex = 0;
      sessionKnown = 0;
      sessionUnknown = 0;
      quizCorrectCount = 0;

      if (sessionMode === 'study') {
        showScreen('screenStudy');
        document.getElementById('studyLevelLabel').textContent = `${sessionLevel} 학습 모드`;
        await renderStudyCard();
      } else {
        showScreen('screenQuiz');
        document.getElementById('quizLevelLabel').textContent = `${sessionLevel} 테스트`;
        await renderQuizCard();
      }
    }

    async function startWrongSession(mode) {
      const wrongWords = allWords.filter((w) => progress.wrongIds.includes(w.word_id));
      if (!wrongWords.length) { showToast('오답 단어가 없습니다.'); return; }
      sessionWords = shuffle(wrongWords);
      sessionIndex = 0;
      sessionKnown = 0;
      sessionUnknown = 0;
      quizCorrectCount = 0;
      sessionMode = mode === 'study' ? 'wrong-study' : 'wrong-quiz';

      if (mode === 'study') {
        showScreen('screenStudy');
        document.getElementById('studyLevelLabel').textContent = '오답 단어 학습';
        await renderStudyCard();
      } else {
        showScreen('screenQuiz');
        document.getElementById('quizLevelLabel').textContent = '오답 단어 테스트';
        await renderQuizCard();
      }
    }

    /* ══════════════════════════════════════════════
       학습 모드
    ══════════════════════════════════════════════ */
    async function renderStudyCard() {
      if (sessionIndex >= sessionWords.length) { showStudyResult(); return; }

      const word = sessionWords[sessionIndex];
      const total = sessionWords.length;
      const current = sessionIndex + 1;

      document.getElementById('studyCount').textContent = `${current} / ${total}`;
      document.getElementById('studyProgress').style.width = `${(current / total) * 100}%`;
      document.getElementById('cardJapanese').textContent = word.japanese;
      document.getElementById('cardHiragana').textContent = word.hiragana;
      document.getElementById('cardKorean').textContent = word.korean;
      document.getElementById('cardEnglish').textContent = word.english;
      document.getElementById('cardCategory').textContent = word.category || '';

      const wrap = document.getElementById('cardImageWrap');
      wrap.textContent = '…';
      wrap._wordId = word.word_id;
      const url = await fetchImage(word);
      renderImage(wrap, url, word.korean, word.english);
    }

    async function handleKnow(known) {
      const word = sessionWords[sessionIndex];
      if (known) {
        sessionKnown++;
        progress.wrongIds = progress.wrongIds.filter((id) => id !== word.word_id);
        if (!progress.learnedIds.includes(word.word_id)) progress.learnedIds.push(word.word_id);
      } else {
        sessionUnknown++;
        if (!progress.wrongIds.includes(word.word_id)) progress.wrongIds.push(word.word_id);
      }
      progress.todayLearned++;
      saveProgress();
      sessionIndex++;
      await renderStudyCard();
    }

    function showStudyResult() {
      const total = sessionWords.length;
      const pct = total ? Math.round((sessionKnown / total) * 100) : 0;
      document.getElementById('resultEmoji').textContent = pct >= 80 ? '🎉' : pct >= 50 ? '📚' : '💪';
      document.getElementById('resultTitle').textContent = pct >= 80 ? '훌륭해요!' : pct >= 50 ? '잘 하고 있어요!' : '조금 더 연습해요!';
      document.getElementById('resultSub').textContent = `${total}개 단어 학습 완료. 알아요 ${sessionKnown}개, 몰라요 ${sessionUnknown}개.`;
      document.getElementById('resDone').textContent = total;
      document.getElementById('resCorrect').textContent = sessionKnown;
      document.getElementById('resWrong').textContent = sessionUnknown;
      showScreen('screenResult');
    }

    /* ══════════════════════════════════════════════
       테스트 모드
    ══════════════════════════════════════════════ */
    async function renderQuizCard() {
      if (sessionIndex >= sessionWords.length) { showQuizResult(); return; }

      quizAnswered = false;
      const word = sessionWords[sessionIndex];
      const total = sessionWords.length;
      const current = sessionIndex + 1;

      document.getElementById('quizCount').textContent = `${current} / ${total}`;
      document.getElementById('quizProgress').style.width = `${(current / total) * 100}%`;
      document.getElementById('quizFeedback').className = 'quiz-feedback';

      const wrap = document.getElementById('quizImageWrap');
      wrap.textContent = '…';
      wrap._wordId = word.word_id;
      const url = await fetchImage(word);
      renderImage(wrap, url, word.korean, word.english);

      // 보기 4개 생성
      const others = shuffle(allWords.filter((w) => w.word_id !== word.word_id)).slice(0, 3);
      const choices = shuffle([word, ...others]);

      const choicesEl = document.getElementById('quizChoices');
      choicesEl.innerHTML = choices.map((c) => `
        <button class="choice-btn" data-id="${c.word_id}">
          ${escHtml(c.japanese)}
          <span class="choice-hira">${escHtml(c.hiragana)}</span>
        </button>
      `).join('');

      choicesEl.querySelectorAll('.choice-btn').forEach((btn) => {
        btn.addEventListener('click', () => handleQuizAnswer(btn, word));
      });
    }

    function handleQuizAnswer(btn, word) {
      if (quizAnswered) return;
      quizAnswered = true;

      const isCorrect = btn.dataset.id === word.word_id;
      const feedback = document.getElementById('quizFeedback');

      if (isCorrect) {
        btn.classList.add('correct');
        feedback.textContent = `✓ 정답! ${word.japanese} = ${word.korean}${word.english ? '  ·  ' + word.english : ''}`;
        feedback.className = 'quiz-feedback show ok';
        quizCorrectCount++;
        progress.wrongIds = progress.wrongIds.filter((id) => id !== word.word_id);
      } else {
        btn.classList.add('wrong');
        feedback.textContent = `✗ 오답. 정답은 ${word.japanese} (${word.korean}${word.english ? ' · ' + word.english : ''})`;
        feedback.className = 'quiz-feedback show ng';
        if (!progress.wrongIds.includes(word.word_id)) progress.wrongIds.push(word.word_id);
      }

      // 정답 버튼 표시
      document.querySelectorAll('.choice-btn').forEach((b) => {
        if (b.dataset.id === word.word_id) b.classList.add('reveal-correct');
        b.style.pointerEvents = 'none';
      });

      progress.todayTotal++;
      progress.todayCorrect += isCorrect ? 1 : 0;
      progress.todayLearned++;
      saveProgress();

      setTimeout(() => nextCard(), 1200);
    }

    function nextCard() {
      sessionIndex++;
      if (sessionMode === 'quiz' || sessionMode === 'wrong-quiz') {
        renderQuizCard();
      } else {
        renderStudyCard();
      }
    }

    function showQuizResult() {
      const total = sessionWords.length;
      const pct = total ? Math.round((quizCorrectCount / total) * 100) : 0;
      document.getElementById('resultEmoji').textContent = pct >= 80 ? '🏆' : pct >= 50 ? '📖' : '🔥';
      document.getElementById('resultTitle').textContent = `정답률 ${pct}%`;
      document.getElementById('resultSub').textContent = `${total}문제 중 ${quizCorrectCount}개 정답!`;
      document.getElementById('resDone').textContent = total;
      document.getElementById('resCorrect').textContent = quizCorrectCount;
      document.getElementById('resWrong').textContent = total - quizCorrectCount;
      showScreen('screenResult');
    }

    /* ══════════════════════════════════════════════
       오답 노트
    ══════════════════════════════════════════════ */
    function showWrongScreen() {
      const wrongWords = (allWords.length ? allWords : SAMPLE_WORDS)
        .filter((w) => progress.wrongIds.includes(w.word_id));

      const list = document.getElementById('wrongList');
      const studyBtn = document.getElementById('wrongStudyBtn');
      const clearBtn = document.getElementById('wrongClearBtn');

      if (!wrongWords.length) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">✨</div>
            <p>오답 단어가 없습니다.</p>
          </div>`;
        studyBtn.style.display = 'none';
        clearBtn.style.display = 'none';
      } else {
        list.innerHTML = wrongWords.map((w) => `
          <div class="wrong-item">
            <div class="wrong-emoji">${w.emoji || '📝'}</div>
            <div>
              <div class="wrong-japanese">${escHtml(w.japanese)}</div>
              <div class="wrong-hiragana">${escHtml(w.hiragana)}</div>
              <div class="wrong-korean">${escHtml(w.korean)} · ${escHtml(w.english)}</div>
            </div>
          </div>`).join('');
        studyBtn.style.display = 'block';
        clearBtn.style.display = 'block';
      }

      showScreen('screenWrong');
    }

    function clearWrongList() {
      if (!confirm('오답 기록을 모두 삭제하시겠습니까?')) return;
      progress.wrongIds = [];
      saveProgress();
      renderMainStats();
      showWrongScreen();
    }

    /* ══════════════════════════════════════════════
       메인 통계 렌더링
    ══════════════════════════════════════════════ */
    function renderMainStats() {
      document.getElementById('statLearned').textContent = progress.todayLearned;
      const pct = progress.todayTotal
        ? Math.round((progress.todayCorrect / progress.todayTotal) * 100) + '%'
        : '—';
      document.getElementById('statAccuracy').textContent = pct;
      document.getElementById('statWrong').textContent = progress.wrongIds.length;
      document.getElementById('wrongCount').textContent = progress.wrongIds.length;
    }

    /* ══════════════════════════════════════════════
       단어 캐시 상태 표시
    ══════════════════════════════════════════════ */
    function updateVocabCacheInfo() {
      const el = document.getElementById('vocabCacheInfo');
      if (!el) return;
      if (typeof ALL_WORDS === 'undefined') {
        el.textContent = '내장 단어 없음 (words_data.js 누락)';
        return;
      }
      const parts = ['N5','N4','N3','N2','N1'].map((l) => {
        const cnt = ALL_WORDS.filter((w) => w.level === l).length;
        return cnt ? `${l} ${cnt}개` : null;
      }).filter(Boolean);
      el.textContent = `내장 단어: ${parts.join(' · ')} (총 ${ALL_WORDS.length}개)`;
    }

    /* ══════════════════════════════════════════════
       로딩 / 토스트
    ══════════════════════════════════════════════ */
    function showLoading(text) {
      document.getElementById('loadingText').textContent = text || '불러오는 중...';
      document.getElementById('loading').classList.add('show');
    }

    function hideLoading() {
      document.getElementById('loading').classList.remove('show');
    }

    let toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
    }

    /* ══════════════════════════════════════════════
       유틸
    ══════════════════════════════════════════════ */
    function escHtml(v) {
      return String(v)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }
  </script>
</body>
</html>
